name: VirtualBox Runner B

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  run:
    runs-on: windows-2022
    timeout-minutes: 370
    steps:
      - name: 📥 Download setup-stream.zip
        run: |
          Write-Host "Downloading setup-stream.zip to Downloads folder..."
          $downloadFolder = "$env:USERPROFILE\Downloads"
          if (!(Test-Path $downloadFolder)) {
            New-Item -ItemType Directory -Path $downloadFolder | Out-Null
          }

          $url = "https://github.com/Thorns2007/super-duper-computing-machine/releases/download/wsv/setup-stream.zip"
          $output = "$downloadFolder\setup-stream.zip"
          Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
          Write-Host "✅ File saved: $output"

          $size = (Get-Item $output).Length
          Write-Host "File size: $size bytes"

      - name: 🧩 Extract setup-stream.zip ke folder Downloads
        run: |
          Write-Host "=== Mengekstrak setup-stream.zip ==="

          $zipPath = "$env:USERPROFILE\\Downloads\\setup-stream.zip"
          $extractPath = "$env:USERPROFILE\\Downloads\\setup-stream"

          if (!(Test-Path $zipPath)) {
            Write-Host "❌ File setup-stream.zip tidak ditemukan: $zipPath"
            exit 1
          }

          if (Test-Path $extractPath) {
            Remove-Item -Recurse -Force $extractPath
            Write-Host "🧹 Folder lama dihapus: $extractPath"
          }

          Write-Host "📦 Mengekstrak ke: $extractPath"
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          Write-Host "✅ setup-stream.zip berhasil diekstrak ke $extractPath"

      - name: 🎬 Install VirtualBox
        run: |
          Write-Host "Downloading and installing VirtualBox..."
          $url = "https://github.com/Thorns2007/super-duper-computing-machine/releases/download/vb/VirtualBox-7.2.6a-172322-Win.exe"
          $installer = "$env:TEMP\VirtualBox-7.2.6a-172322-Win.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Running installer silently..."
          Start-Process -FilePath $installer -ArgumentList "--silent" -Wait
          Write-Host "VirtualBox installation finished."

      - name: Register and Start VirtualBox VM
        shell: cmd
        run: |
          "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" registervm "C:\Users\runneradmin\Downloads\setup-stream\Debian13\Debian13.vbox"
          "C:\Program Files\Oracle\VirtualBox\VBoxManage.exe" startvm "Debian13" --type headless

      - name: ⏳ Keep alive (5 jam)
        run: |
          $mins = 300
          $end = (Get-Date).AddMinutes($mins)

          while ((Get-Date) -lt $end) {
            $left = [int][math]::Ceiling(($end - (Get-Date)).TotalMinutes)
            Write-Host "Alive... ($left min left)"
            Start-Sleep -Seconds 60
          }

      - name: 🔁 Trigger Workflow A
        run: |
          $headers = @{
            "Authorization" = "Bearer ${{ secrets.GITHUB_TOKEN }}"
            "Accept"        = "application/vnd.github+json"
          }
          $body = @{ ref = "main" } | ConvertTo-Json

          $repo = "${{ github.repository }}"
          $url  = "https://api.github.com/repos/$repo/actions/workflows/workflow-a.yml/dispatches"

          Invoke-RestMethod -Uri $url -Method POST -Headers $headers -Body $body -ContentType "application/json"
          Write-Host "✅ Workflow A berhasil di-trigger."
